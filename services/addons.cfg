# openHAB add-on installation.
# NOTE: this file is only regarded at the VERY FIRST START of a fresh instance.
# OH5 migration (set 2026-05-31).

package = standard

binding = mqtt,hue,sonos,tplinksmarthome,astro,systeminfo,pushover
persistence = mapdb,rrd4j
transformation = map,jsonpath,regex
misc = openhabcloud

# pushover is a Thing-based binding in OH5 (not an action), so it is listed under
# binding above; its account Thing lives in things/pushover.things (gitignored).
